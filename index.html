<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arcade Classroom</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>🎮 Arcade Classroom</h1>
    <p>Disfruta este clásico juego en línea. Usa el botón de pantalla completa para mejor experiencia.</p>

    <div class="iframe-container">
      <iframe id="gameFrame" src="https://www.retrogames.cc/embed/9123-marvel-vs-capcom-clash-of-super-heroes-980123-usa.html"
        width="600" height="450" frameborder="no" allowfullscreen="true"
        webkitallowfullscreen="true" mozallowfullscreen="true" scrolling="no"></iframe>
    </div>

    <div class="controls">
      <button id="fullscreenBtn">Pantalla completa</button>
      <button id="reloadBtn">Recargar juego</button>
    </div>
  </div>

  <footer>© 2025 Arcade Classroom — Uso educativo</footer>
  <script src="script.js"></script>
</body>
</html>
