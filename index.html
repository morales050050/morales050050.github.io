<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rompecabezas Deslizante</title>

<style>
body {
    font-family: Arial;
    background:#1e1e2f;
    color:white;
    text-align:center;
    margin:0;
    padding:10px;
}

/* TABLERO */
#board {
    display:grid;
    width:90vw;
    max-width:520px;
    margin:20px auto;
    gap:2px;

    touch-action:none;
    transform-origin:center center;
}

/* PIEZAS */
.tile {
    aspect-ratio:1/1;
    background:white;
    color:black;
    display:flex;
    justify-content:center;
    align-items:center;
    border-radius:4px;
    font-weight:bold;
    cursor:pointer;
    font-size:clamp(8px,2.5vw,18px);
}

.empty {
    background:transparent;
}

/* BOTONES */
button {
    padding:10px;
    margin:4px;
    border:none;
    border-radius:8px;
    background:#ff4757;
    color:white;
    cursor:pointer;
    width:90%;
    max-width:260px;
}

@media(min-width:600px){
    button{ width:auto; }
}
</style>
</head>

<body>

<h2>🧩 Rompecabezas Deslizante</h2>

<div id="menu">
    <p>Selecciona dificultad</p>

    <!-- hasta 20x20 -->
    <button onclick="startGame(3)">3x3</button>
    <button onclick="startGame(4)">4x4</button>
    <button onclick="startGame(5)">5x5</button>
    <button onclick="startGame(6)">6x6</button>
    <button onclick="startGame(7)">7x7</button>
    <button onclick="startGame(8)">8x8</button>
    <button onclick="startGame(9)">9x9</button>
    <button onclick="startGame(10)">10x10</button>
    <button onclick="startGame(11)">11x11</button>
    <button onclick="startGame(12)">12x12</button>
    <button onclick="startGame(13)">13x13</button>
    <button onclick="startGame(14)">14x14</button>
    <button onclick="startGame(15)">15x15</button>
    <button onclick="startGame(16)">16x16</button>
    <button onclick="startGame(17)">17x17</button>
    <button onclick="startGame(18)">18x18</button>
    <button onclick="startGame(19)">19x19</button>
    <button onclick="startGame(20)">20x20 🔥</button>
</div>

<div id="game" style="display:none;">
    <button onclick="goMenu()">⬅ Volver</button>

    <div id="board"></div>

    <p>Movimientos: <span id="moves">0</span></p>
    <p>Tiempo: <span id="timer">00:00</span></p>

    <div>
        <p>Referencia:</p>
        <div id="solutionPreview"></div>
    </div>
</div>

<script>
let size, board=[], moves;
let timerInterval, seconds=0;

/* ZOOM */
let scale=1, startDist=0;
let currentX=0, currentY=0;
let lastX=0, lastY=0;
let isDragging=false;

const boardEl=document.getElementById("board");

function getDistance(t){
    let dx=t[0].clientX-t[1].clientX;
    let dy=t[0].clientY-t[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
}

boardEl.addEventListener("touchstart",(e)=>{
    if(e.touches.length===2){
        startDist=getDistance(e.touches);
    }
    if(e.touches.length===1){
        isDragging=true;
        lastX=e.touches[0].clientX;
        lastY=e.touches[0].clientY;
    }
});

boardEl.addEventListener("touchmove",(e)=>{
    e.preventDefault();

    if(e.touches.length===2){
        let newDist=getDistance(e.touches);
        let zoom=newDist/startDist;

        scale*=zoom;
        scale=Math.max(1,Math.min(scale,4));
        startDist=newDist;

        applyTransform();
    }

    if(e.touches.length===1 && isDragging){
        let dx=e.touches[0].clientX-lastX;
        let dy=e.touches[0].clientY-lastY;

        currentX+=dx;
        currentY+=dy;

        lastX=e.touches[0].clientX;
        lastY=e.touches[0].clientY;

        applyTransform();
    }
});

boardEl.addEventListener("touchend",()=>{
    isDragging=false;
});

function applyTransform(){
    boardEl.style.transform =
        `translate(${currentX}px,${currentY}px) scale(${scale})`;
}

function resetZoom(){
    scale=1;
    currentX=0;
    currentY=0;
    boardEl.style.transform="translate(0,0) scale(1)";
}

/* JUEGO */
function startGame(n){
    size=n;
    moves=0;
    seconds=0;

    resetZoom();
    movesEl.textContent=0;

    menu.style.display="none";
    game.style.display="block";

    createBoard();
    drawSolution();
    startTimer();
}

function goMenu(){
    menu.style.display="block";
    game.style.display="none";
    stopTimer();
}

function createBoard(){
    board=[];
    for(let i=1;i<size*size;i++) board.push(i);
    board.push(0);
    shuffle(board);
    draw();
}

function draw(){
    boardEl.innerHTML="";
    boardEl.style.gridTemplateColumns=`repeat(${size},1fr)`;

    board.forEach((n,i)=>{
        let d=document.createElement("div");
        d.className="tile";

        if(n===0){
            d.classList.add("empty");
        } else {
            d.textContent=n;
            d.onclick=()=>move(i);
        }

        boardEl.appendChild(d);
    });
}

function move(i){
    let e=board.indexOf(0);
    let valid=[i-1,i+1,i-size,i+size];

    if(valid.includes(e)&&!(i%size===0&&e===i-1)&&!(i%size===size-1&&e===i+1)){
        [board[i],board[e]]=[board[e],board[i]];
        moves++;
        movesEl.textContent=moves;
        draw();
        checkWin();
    }
}

function shuffle(a){
    do{
        for(let i=a.length-1;i>0;i--){
            let j=Math.floor(Math.random()*(i+1));
            [a[i],a[j]]=[a[j],a[i]];
        }
    }while(!solvable(a));
}

function solvable(a){
    let inv=0;
    for(let i=0;i<a.length;i++){
        for(let j=i+1;j<a.length;j++){
            if(a[i]&&a[j]&&a[i]>a[j]) inv++;
        }
    }

    if(size%2!==0) return inv%2===0;

    let row=Math.floor(a.indexOf(0)/size);
    return (inv+row)%2!==0;
}

function checkWin(){
    for(let i=0;i<board.length-1;i++){
        if(board[i]!==i+1) return;
    }

    stopTimer();

    setTimeout(()=>{
        alert("🎉 Ganaste\nMovimientos: "+moves+"\nTiempo: "+timer.textContent);
    },100);
}

/* TIMER */
function startTimer(){
    clearInterval(timerInterval);
    seconds=0;
    updateTimer();

    timerInterval=setInterval(()=>{
        seconds++;
        updateTimer();
    },1000);
}

function stopTimer(){
    clearInterval(timerInterval);
}

function updateTimer(){
    let min=Math.floor(seconds/60);
    let sec=seconds%60;

    timer.textContent =
        String(min).padStart(2,'0')+":"+String(sec).padStart(2,'0');
}

/* REFERENCIA */
function drawSolution(){
    solutionPreview.innerHTML="";

    let div=document.createElement("div");
    div.style.display="grid";
    div.style.gridTemplateColumns=`repeat(${size},10px)`;
    div.style.gap="1px";
    div.style.justifyContent="center";

    for(let i=1;i<size*size;i++){
        let t=document.createElement("div");
        t.style.width="10px";
        t.style.height="10px";
        t.style.background="#fff";
        t.style.fontSize="6px";
        t.style.color="#000";
        t.style.display="flex";
        t.style.alignItems="center";
        t.style.justifyContent="center";
        t.textContent=i;
        div.appendChild(t);
    }

    let empty=document.createElement("div");
    empty.style.width="10px";
    empty.style.height="10px";
    div.appendChild(empty);

    solutionPreview.appendChild(div);
}

/* ELEMENTOS */
const movesEl=document.getElementById("moves");
const menu=document.getElementById("menu");
const game=document.getElementById("game");
const timer=document.getElementById("timer");
const solutionPreview=document.getElementById("solutionPreview");
</script>

</body>
</html>
